<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | The Reel Recipe</title>
  <meta name="description" content="Complete your enrolment — TRR Learning.">
  <meta name="theme-color" content="#090b1a">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="./fonts/vip-hala-bold.otf" as="font" type="font/otf" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,700;1,800&family=Figtree:wght@300;400;500;600&family=Cairo:wght@400;500;600;700;800&display=block" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css">

  <style>
    .checkout-wrap {
      min-height: calc(100svh - 68px);
      padding: clamp(100px, 12vw, 148px) 0 clamp(64px, 8vw, 100px);
    }

    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: clamp(32px, 5vw, 64px);
      align-items: start;
    }

    .checkout-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: sticky;
      top: 88px;
    }

    .summary-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-2);
    }

    .summary-title {
      font-family: var(--fd);
      font-size: clamp(24px, 3vw, 32px);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 1.05;
      color: var(--text);
    }

    .summary-type-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .type-badge {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 4px;
    }
    .type-badge--online {
      color: var(--accent);
      background: oklch(74% 0.17 168 / 0.12);
      border: 1px solid oklch(74% 0.17 168 / 0.28);
    }
    .type-badge--physical {
      color: oklch(80% 0.16 55);
      background: oklch(80% 0.16 55 / 0.1);
      border: 1px solid oklch(80% 0.16 55 / 0.28);
    }

    .summary-divider {
      height: 1px;
      background: var(--border);
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--text-2);
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .total-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-2);
    }

    .total-amount {
      font-family: var(--fd);
      font-size: clamp(28px, 3.5vw, 38px);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .vat-note {
      font-size: 11px;
      color: var(--text-2);
      text-align: right;
    }

    .summary-refund-note {
      font-size: 12px;
      color: oklch(80% 0.008 278);
      line-height: 1.6;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .summary-refund-note a {
      color: var(--accent);
      text-decoration: underline;
    }

    /* Payment area */
    .checkout-main {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .checkout-section-title {
      font-family: var(--fd);
      font-size: clamp(28px, 3.5vw, 40px);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .checkout-notice {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.6;
    }

    .checkout-notice-icon {
      flex-shrink: 0;
      margin-top: 1px;
      color: var(--accent);
    }

    /* PAYMENT INTEGRATION MOUNT POINT */
    /* Egyptian gateway (Paymob / Fawry / Kashier) iframe or redirect mounts here later. */
    /* Amount/currency MUST be read from courses-data.js, never hard-coded here. */
    #payment-container {
      min-height: 64px;
    }

    .pay-placeholder {
      padding: 24px 20px;
      background: var(--surface);
      border: 1px dashed var(--border-2);
      border-radius: var(--r-lg);
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      text-align: center;
    }

    .pay-placeholder-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-2);
    }

    .pay-placeholder-sub {
      font-size: 13px;
      color: oklch(72% 0.012 278);
    }

    #pay-btn {
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 28px;
      background: var(--border-2);
      color: oklch(60% 0.008 278);
      border: none;
      border-radius: var(--r);
      cursor: not-allowed;
      width: 100%;
    }

    /* DEMO ONLY — remove before going live */
    .demo-simulate {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: oklch(72% 0.012 278);
      padding: 12px;
      border: 1px dashed var(--border);
      border-radius: var(--r);
    }

    .demo-simulate a {
      color: oklch(80% 0.16 55);
      text-decoration: underline;
      font-weight: 600;
    }

    .error-state {
      padding: clamp(100px, 12vw, 148px) 0;
      text-align: center;
    }

    @media (max-width: 768px) {
      .checkout-layout {
        grid-template-columns: 1fr;
      }
      .checkout-summary {
        position: static;
        order: -1;
      }
    }
  </style>
</head>

<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- ===== NAVBAR ===== -->
  <div class="navbar-wrap" id="navbar-wrap">
    <nav class="navbar" id="navbar">
      <div class="nb-content">
        <a href="../" class="nb-logo">
          <picture>
            <source srcset="./logo-icon.avif" type="image/avif">
            <img src="./logo-icon.png" alt="" class="nb-logo-icon">
          </picture>
          <picture>
            <source srcset="./logo-wordmark.avif" type="image/avif">
            <img src="./logo-wordmark.png" alt="The Reel Recipe" class="nb-logo-wordmark">
          </picture>
        </a>

        <div class="nb-links" id="nb-links">
          <a href="./index.html" class="nb-link nb-link--courses">Courses</a>
          <a href="./contact.html" class="nb-link">Contact</a>
          <a href="./login.html" class="nb-link" id="nav-login">Login</a>
          <a href="./my-learning.html" class="nb-link" id="nav-mylearning" style="display:none">My Learning</a>
          <button class="nb-link" id="nav-logout" style="display:none;background:none;border:none;cursor:pointer;font:inherit;color:inherit;padding:0;">Log out</button>
        </div>

        <div class="nb-right-mobile">
          <button type="button" class="nb-menu-btn" id="menuBtn" aria-label="Toggle menu">
            <svg id="iconMenu" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            <svg id="iconX" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
    </nav>
  </div>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobileMenu">
    <div class="mm-header">
      <picture>
        <source srcset="./logo-icon.avif" type="image/avif">
        <img src="./logo-icon.png" alt="" class="mm-logo-icon">
      </picture>
      <button type="button" class="mobile-close" onclick="closeMobile()" aria-label="Close menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="mobile-links">
      <a href="./index.html" class="mobile-link mobile-link--courses" onclick="closeMobile()">Courses</a>
      <a href="./contact.html" class="mobile-link" onclick="closeMobile()">Contact</a>
      <a href="./login.html" class="mobile-link" id="mob-login" onclick="closeMobile()">Login</a>
      <a href="./my-learning.html" class="mobile-link" id="mob-mylearning" style="display:none" onclick="closeMobile()">My Learning</a>
      <button class="mobile-link" id="mob-logout" style="display:none;background:none;border:none;cursor:pointer;font:inherit;text-align:left;width:100%;padding:10px 0;border-bottom:1px solid var(--border);" onclick="closeMobile()">Log out</button>
    </div>
  </div>

  <main id="main-content">
    <div class="checkout-wrap">
      <div class="container" id="checkout-root">
        <!-- populated by JS -->
      </div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="container">
      <div class="footer-top">
        <a href="../" class="footer-brand">
          <picture>
            <source srcset="./logo-icon.avif" type="image/avif">
            <img src="./logo-icon.png" alt="" class="footer-icon">
          </picture>
          <picture>
            <source srcset="./logo-wordmark.avif" type="image/avif">
            <img src="./logo-wordmark.png" alt="The Reel Recipe" class="footer-wm">
          </picture>
        </a>
        <p class="footer-tag">Viral content. Real results</p>
      </div>
      <div class="footer-bottom">
        <nav class="footer-nav">
          <a href="./index.html" class="footer-link">Courses</a>
          <a href="./refund-policy.html" class="footer-link">Refund Policy</a>
          <a href="./terms.html" class="footer-link">Terms</a>
          <a href="./contact.html" class="footer-link">Contact</a>
        </nav>
        <div class="footer-end">
          <div class="footer-socials">
            <a href="https://instagram.com/thereelrecipe" target="_blank" rel="noopener noreferrer" class="fsoc" aria-label="Instagram">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
            </a>
            <a href="https://tiktok.com/@thereelrecipe" target="_blank" rel="noopener noreferrer" class="fsoc" aria-label="TikTok">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.34-6.34V9.42a8.16 8.16 0 004.76 1.52V7.49a4.81 4.81 0 01-1-.8z"/></svg>
            </a>
          </div>
          <p class="footer-copy" id="footerCopy"></p>
        </div>
      </div>
    </div>
  </footer>

  <script type="module">
    import { getCourseById, formatPrice } from './courses-data.js';
    import { isAuthenticated, logout } from './auth.js';

    /* Auth-aware nav */
    const authed = isAuthenticated();
    document.getElementById('nav-login').style.display      = authed ? 'none' : '';
    document.getElementById('nav-mylearning').style.display = authed ? ''     : 'none';
    document.getElementById('nav-logout').style.display     = authed ? ''     : 'none';
    document.getElementById('mob-login').style.display      = authed ? 'none' : '';
    document.getElementById('mob-mylearning').style.display = authed ? ''     : 'none';
    document.getElementById('mob-logout').style.display     = authed ? ''     : 'none';
    document.getElementById('nav-logout').addEventListener('click', logout);
    document.getElementById('mob-logout').addEventListener('click', logout);

    /* Resolve course from query string */
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get('course');
    const course = courseId ? getCourseById(courseId) : null;
    const root = document.getElementById('checkout-root');

    if (!course) {
      root.innerHTML = `
        <div class="error-state">
          <div class="section-label">Error</div>
          <h1 class="section-title">Course not found</h1>
          <p class="section-sub" style="margin-top:16px">
            <a href="./index.html" class="btn-primary" style="display:inline-flex;margin-top:20px">
              Browse courses
            </a>
          </p>
        </div>`;
    } else {
      const typeLabel  = course.type === 'online' ? 'Online' : 'In-person';
      const badgeClass = course.type === 'online' ? 'type-badge--online' : 'type-badge--physical';
      const venueLine  = course.venue
        ? `<span class="summary-line"><span>Venue</span><span>${course.venue}</span></span>`
        : '';
      const dateLine   = course.date
        ? `<span class="summary-line"><span>Date</span><span>${course.date}</span></span>`
        : '';

      // DEMO ONLY — remove before going live ↓
      const demoLink = `./order-confirmation.html?course=${encodeURIComponent(course.id)}`;

      root.innerHTML = `
        <div class="checkout-layout">

          <!-- Left: payment area -->
          <div class="checkout-main">
            <h1 class="checkout-section-title">Complete your enrolment</h1>

            <div class="checkout-notice">
              <svg class="checkout-notice-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              <span>You do not need an account to purchase. After payment, you'll receive your access by email.</span>
            </div>

            <!-- PAYMENT INTEGRATION MOUNT POINT -->
            <!-- Egyptian gateway (Paymob / Fawry / Kashier) iframe or redirect mounts here later. -->
            <!-- Amount/currency MUST be read from courses-data.js, never hard-coded here. -->
            <div id="payment-container">
              <div class="pay-placeholder">
                <span class="pay-placeholder-label">Payment gateway</span>
                <span class="pay-placeholder-sub">Paymob / Fawry / Kashier integration coming soon</span>
              </div>
            </div>

            <button id="pay-btn" disabled aria-disabled="true">Payment integration coming soon</button>

            <!-- DEMO ONLY — this link is for prototype testing only. Remove before going live. -->
            <div class="demo-simulate" aria-hidden="true">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              Demo only —
              <a href="${demoLink}">Simulate successful payment</a>
            </div>
          </div>

          <!-- Right: order summary -->
          <aside class="checkout-summary">
            <span class="summary-label">Order summary</span>
            <h2 class="summary-title">${course.title}</h2>
            <div class="summary-type-row">
              <span class="type-badge ${badgeClass}">${typeLabel}</span>
            </div>
            ${venueLine || dateLine
              ? `<div style="display:flex;flex-direction:column;gap:6px">${venueLine}${dateLine}</div>`
              : ''}
            <div class="summary-divider"></div>
            <div style="display:flex;flex-direction:column;gap:6px">
              <div class="summary-total">
                <span class="total-label">Total</span>
                <span class="total-amount">${formatPrice(course.priceEGP)}</span>
              </div>
              <p class="vat-note">Price includes VAT</p>
            </div>
            <p class="summary-refund-note">
              You have a 14-day refund right under Egyptian Consumer Protection Law No. 181/2018.
              For online courses, the right ends once you access a substantial part of the content.
              <a href="./refund-policy.html">Full Refund Policy →</a>
            </p>
          </aside>

        </div>
      `;
    }

    /* Navbar */
    const navbar  = document.getElementById('navbar');
    const menuBtn = document.getElementById('menuBtn');
    const iconMenu = document.getElementById('iconMenu');
    const iconX   = document.getElementById('iconX');
    const mobileMenu = document.getElementById('mobileMenu');

    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 50);
    }, { passive: true });

    if (menuBtn) {
      menuBtn.addEventListener('click', () => {
        const open = mobileMenu.classList.toggle('open');
        iconMenu.style.display = open ? 'none'  : 'block';
        iconX.style.display    = open ? 'block' : 'none';
        navbar.classList.toggle('menu-open', open);
      });
    }

    window.closeMobile = function() {
      mobileMenu.classList.remove('open');
      if (iconMenu) iconMenu.style.display = 'block';
      if (iconX)    iconX.style.display    = 'none';
      navbar.classList.remove('menu-open');
    };

    document.getElementById('footerCopy').textContent =
      `© ${new Date().getFullYear()} The Reel Recipe. All rights reserved.`;
  </script>
</body>
</html>
