<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses | The Reel Recipe</title>
  <meta name="description" content="Browse all TRR Learning courses — online and in-person workshops on viral content creation.">
  <meta name="theme-color" content="#090b1a">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="../fonts/vip-hala-bold.otf" as="font" type="font/otf" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,700;1,800&family=Figtree:wght@300;400;500;600&family=Cairo:wght@400;500;600;700;800&display=block" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">

  <style>
    /* ── Hero ── */
    .courses-hero {
      padding: clamp(120px, 16vw, 196px) 0 clamp(48px, 6vw, 72px);
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .courses-hero::after {
      content: '';
      position: absolute;
      top: 10%; right: -8%;
      width: 55%; height: 70%;
      background: radial-gradient(ellipse at center, oklch(74% 0.17 168 / 0.06) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    .courses-hero .container { position: relative; z-index: 1; }

    .courses-hl {
      font-family: var(--fd);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 0.87;
      display: flex;
      flex-direction: column;
      margin-bottom: clamp(28px, 3.5vw, 48px);
    }

    .chl-1 {
      font-size: clamp(54px, 9.5vw, 128px);
      color: var(--text-2);
      font-style: italic;
    }

    .chl-2 {
      font-size: clamp(88px, 16vw, 216px);
      color: var(--text);
      line-height: 0.82;
    }

    .hero-foot {
      display: flex;
      align-items: center;
      gap: clamp(20px, 3vw, 40px);
      flex-wrap: wrap;
    }

    /* ── Course list — editorial numbered rows ── */
    .course-list {
      display: flex;
      flex-direction: column;
      padding-bottom: clamp(64px, 9vw, 120px);
    }

    .cr {
      display: grid;
      grid-template-columns: clamp(56px, 7vw, 84px) 1fr auto;
      align-items: start;
      gap: clamp(16px, 3vw, 44px);
      padding: clamp(28px, 4.5vw, 52px) 0;
      border-top: 1px solid var(--border);
      transition: background 0.2s ease;
    }

    .cr:last-child { border-bottom: 1px solid var(--border); }
    .cr:hover { background: oklch(74% 0.17 168 / 0.03); }

    .cr-n {
      font-family: var(--fd);
      font-size: clamp(38px, 6vw, 72px);
      font-weight: 800;
      line-height: 1;
      color: var(--border-2);
      user-select: none;
      padding-top: 2px;
      transition: color 0.2s ease;
    }

    .cr:hover .cr-n { color: var(--accent); }

    .cr-body { display: flex; flex-direction: column; gap: 10px; }

    .cr-top {
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
    }

    .cr-title {
      font-family: var(--fd);
      font-size: clamp(26px, 3.8vw, 48px);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.015em;
      line-height: 1;
      color: var(--text);
      transition: color 0.2s ease;
    }

    .cr:hover .cr-title { color: var(--accent); }

    .type-badge {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 4px;
      flex-shrink: 0;
      position: relative;
      top: -2px;
    }

    .type-badge--online {
      color: var(--accent);
      background: oklch(74% 0.17 168 / 0.12);
      border: 1px solid oklch(74% 0.17 168 / 0.3);
    }

    .type-badge--physical {
      color: oklch(80% 0.16 55);
      background: oklch(80% 0.16 55 / 0.1);
      border: 1px solid oklch(80% 0.16 55 / 0.28);
    }

    .cr-blurb {
      font-size: clamp(13px, 1.4vw, 15px);
      color: oklch(82% 0.008 278);
      line-height: 1.72;
      max-width: 52ch;
    }

    .cr-venue {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: oklch(70% 0.012 278);
    }

    .cr-action {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 14px;
      padding-top: 2px;
      min-width: 140px;
    }

    .cr-price-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .cr-price {
      font-family: var(--fd);
      font-size: clamp(28px, 3.5vw, 44px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }

    .cr-vat { font-size: 11px; color: var(--text-2); }

    @media (max-width: 720px) {
      .cr { grid-template-columns: clamp(44px, 9vw, 60px) 1fr; }

      .cr-action {
        grid-column: 1 / -1;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        padding-top: 8px;
        padding-left: calc(clamp(44px, 9vw, 60px) + clamp(16px, 3vw, 44px));
        min-width: unset;
      }

      .cr-price-block { align-items: flex-start; }
    }

    @media (max-width: 480px) {
      .cr-action { padding-left: 0; flex-direction: column; align-items: flex-start; }
      .cr-action .btn-primary { width: 100%; justify-content: center; }
    }
  </style>
</head>

<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <div class="navbar-wrap" id="navbar-wrap">
    <nav class="navbar" id="navbar">
      <div class="nb-content">
        <a href="../" class="nb-logo">
          <picture>
            <source srcset="../logo-icon.avif" type="image/avif">
            <img src="../logo-icon.png" alt="" class="nb-logo-icon">
          </picture>
          <picture>
            <source srcset="../logo-wordmark.avif" type="image/avif">
            <img src="../logo-wordmark.png" alt="The Reel Recipe" class="nb-logo-wordmark">
          </picture>
        </a>
        <div class="nb-links">
          <a href="./courses.html" class="nb-link nb-link--courses">Courses</a>
          <a href="./contact.html" class="nb-link">Contact</a>
          <a href="./login.html" class="nb-link" id="nav-login">Login</a>
          <a href="./my-learning.html" class="nb-link" id="nav-mylearning" style="display:none">My Learning</a>
          <button class="nb-link" id="nav-logout" style="display:none;background:none;border:none;cursor:pointer;font:inherit;color:inherit;padding:0;">Log out</button>
        </div>
        <div class="nb-right-mobile">
          <button type="button" class="nb-menu-btn" id="menuBtn" aria-label="Toggle menu">
            <svg id="iconMenu" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            <svg id="iconX" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
    </nav>
  </div>

  <div class="mobile-menu" id="mobileMenu">
    <div class="mm-header">
      <picture>
        <source srcset="../logo-icon.avif" type="image/avif">
        <img src="../logo-icon.png" alt="" class="mm-logo-icon">
      </picture>
      <button type="button" class="mobile-close" onclick="closeMobile()" aria-label="Close menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="mobile-links">
      <a href="./courses.html" class="mobile-link mobile-link--courses" onclick="closeMobile()">Courses</a>
      <a href="./contact.html" class="mobile-link" onclick="closeMobile()">Contact</a>
      <a href="./login.html" class="mobile-link" id="mob-login" onclick="closeMobile()">Login</a>
      <a href="./my-learning.html" class="mobile-link" id="mob-mylearning" style="display:none" onclick="closeMobile()">My Learning</a>
      <button class="mobile-link" id="mob-logout" style="display:none;background:none;border:none;cursor:pointer;font:inherit;text-align:left;width:100%;padding:10px 0;border-bottom:1px solid var(--border);" onclick="closeMobile()">Log out</button>
    </div>
  </div>

  <main id="main-content">

    <section class="courses-hero">
      <div class="container">
        <div class="section-label fade-up" style="animation-delay:.1s">TRR Learning</div>
        <h1 class="courses-hl">
          <span class="chl-1 fade-up" style="animation-delay:.2s">All</span>
          <span class="chl-2 fade-up" style="animation-delay:.32s">Courses</span>
        </h1>
        <div class="hero-foot fade-up" style="animation-delay:.44s">
          <div class="hero-accent-line" style="margin:0"></div>
          <p class="hero-sub" style="margin:0;max-width:46ch">
            Online courses and in-person workshops on viral content — built from 500M+ real views
          </p>
        </div>
      </div>
    </section>

    <section style="padding-top:0">
      <div class="container">
        <div class="course-list" id="courses-list"></div>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-top">
        <a href="../" class="footer-brand">
          <picture>
            <source srcset="../logo-icon.avif" type="image/avif">
            <img src="../logo-icon.png" alt="" class="footer-icon">
          </picture>
          <picture>
            <source srcset="../logo-wordmark.avif" type="image/avif">
            <img src="../logo-wordmark.png" alt="The Reel Recipe" class="footer-wm">
          </picture>
        </a>
        <p class="footer-tag">Viral content. Real results</p>
      </div>
      <div class="footer-bottom">
        <nav class="footer-nav">
          <a href="./courses.html" class="footer-link">Courses</a>
          <a href="./refund-policy.html" class="footer-link">Refund Policy</a>
          <a href="./terms.html" class="footer-link">Terms</a>
          <a href="./contact.html" class="footer-link">Contact</a>
        </nav>
        <div class="footer-end">
          <div class="footer-socials">
            <a href="https://instagram.com/thereelrecipe" target="_blank" rel="noopener noreferrer" class="fsoc" aria-label="Instagram">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
            </a>
            <a href="https://tiktok.com/@thereelrecipe" target="_blank" rel="noopener noreferrer" class="fsoc" aria-label="TikTok">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.34-6.34V9.42a8.16 8.16 0 004.76 1.52V7.49a4.81 4.81 0 01-1-.8z"/></svg>
            </a>
          </div>
          <p class="footer-copy" id="footerCopy"></p>
        </div>
      </div>
    </div>
  </footer>

  <script type="module">
    import { COURSES, formatPrice } from './courses-data.js';
    import { isAuthenticated, logout } from './auth.js';

    const authed = isAuthenticated();
    document.getElementById('nav-login').style.display      = authed ? 'none' : '';
    document.getElementById('nav-mylearning').style.display = authed ? ''     : 'none';
    document.getElementById('nav-logout').style.display     = authed ? ''     : 'none';
    document.getElementById('mob-login').style.display      = authed ? 'none' : '';
    document.getElementById('mob-mylearning').style.display = authed ? ''     : 'none';
    document.getElementById('mob-logout').style.display     = authed ? ''     : 'none';
    document.getElementById('nav-logout').addEventListener('click', logout);
    document.getElementById('mob-logout').addEventListener('click', logout);

    const list = document.getElementById('courses-list');

    COURSES.forEach((course, i) => {
      const typeLabel  = course.type === 'online' ? 'Online' : 'In-person';
      const badgeClass = course.type === 'online' ? 'type-badge--online' : 'type-badge--physical';
      const venueLine  = (course.venue || course.date)
        ? `<div class="cr-venue">${[course.venue, course.date].filter(Boolean).join(' · ')}</div>`
        : '';

      const row = document.createElement('article');
      row.className = 'cr scroll-reveal';
      row.style.transitionDelay = `${i * 0.07}s`;
      row.innerHTML = `
        <div class="cr-n" aria-hidden="true">${String(i + 1).padStart(2, '0')}</div>
        <div class="cr-body">
          <div class="cr-top">
            <h2 class="cr-title">${course.title}</h2>
            <span class="type-badge ${badgeClass}">${typeLabel}</span>
          </div>
          <p class="cr-blurb">${course.blurb}</p>
          ${venueLine}
        </div>
        <div class="cr-action">
          <div class="cr-price-block">
            <span class="cr-price">${formatPrice(course.priceEGP)}</span>
            <span class="cr-vat">incl. VAT</span>
          </div>
          <a href="./checkout.html?course=${encodeURIComponent(course.id)}" class="btn-primary">
            Enrol
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </a>
        </div>
      `;
      list.appendChild(row);
    });

    const navbar     = document.getElementById('navbar');
    const menuBtn    = document.getElementById('menuBtn');
    const iconMenu   = document.getElementById('iconMenu');
    const iconX      = document.getElementById('iconX');
    const mobileMenu = document.getElementById('mobileMenu');

    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 50);
    }, { passive: true });

    menuBtn.addEventListener('click', () => {
      const open = mobileMenu.classList.toggle('open');
      iconMenu.style.display = open ? 'none'  : 'block';
      iconX.style.display    = open ? 'block' : 'none';
      navbar.classList.toggle('menu-open', open);
    });

    window.closeMobile = function () {
      mobileMenu.classList.remove('open');
      iconMenu.style.display = 'block';
      iconX.style.display    = 'none';
      navbar.classList.remove('menu-open');
    };

    const ro = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.08, rootMargin: '-20px' });
    document.querySelectorAll('.scroll-reveal').forEach(el => ro.observe(el));

    document.getElementById('footerCopy').textContent =
      `© ${new Date().getFullYear()} The Reel Recipe. All rights reserved.`;
  </script>
</body>
</html>
